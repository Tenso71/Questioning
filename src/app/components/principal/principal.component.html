<div class="foro-container">
  <div *ngFor="let pregunta of preguntasFavoritas" class="pregunta">
    <h3 class="titulo-pregunta">{{ pregunta.titulo }}</h3>
    <p class="autor-pregunta">Por: {{ pregunta.autor }}</p>
    <div class="interacciones">
      <span class="votos">👍 {{ pregunta.votos }} votos</span>
      <span class="respuestas">💬 {{ pregunta.respuestas }} respuestas</span>
    </div>
    <button class="btn-ver-pregunta">Ver Pregunta</button>
  </div>
</div>
