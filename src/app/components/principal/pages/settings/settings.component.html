<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Configuración</h1>
        <div class="tab">Mi Perfil</div>

        <div class="content">
            <div class="box">
                <label for="language"><strong>Idioma</strong></label>
                <select id="language">
                    <option value="es">Español (España)</option>
                    <option value="en">Inglés</option>
                    <option value="fr">Francés</option>
                    <option value="de">Alemán</option>
                </select>
            </div>

            <div class="box">
                <label for="email"><strong>Correo de Contacto</strong></label>
                <input type="email" id="email" placeholder="Tu correo electrónico">
                <label for="message"><strong>Mensaje</strong></label>
                <textarea id="message" placeholder="Escribe aquí tu mensaje..."></textarea>
                <button class="send-btn">Enviar</button>
            </div>
        </div>

        <button class="logout-btn" onclick="location.href='index.html'">Cerrar Sesión</button>
    </div>
</body>
</html>
